<style>
        /* Base styles to ensure dark mode canvas applies correctly */
        body {
            background-color: #111319; /* Fallback */
            color: #F1F3F5;
        }
        
        /* Font variation settings for material symbols */
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-background to-surface-container-highest min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Atmospheric background glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Card -->
<main class="w-full max-w-[420px] bg-surface border border-border-subtle rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.4)] p-container-padding relative z-10 flex flex-col gap-[32px]">
<!-- Header / Branding -->
<header class="flex flex-col items-center text-center gap-2">
<div class="w-12 h-12 bg-surface-hover border border-border-subtle rounded-lg flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-[28px]" data-weight="fill">storefront</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-text-primary tracking-tight">VendorBridge</h1>
<p class="font-body-md text-body-md text-text-secondary">Secure Procurement Portal</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-text-secondary text-[20px] pointer-events-none">mail</span>
<input class="w-full h-input-height bg-surface border border-border-subtle rounded-DEFAULT text-text-primary font-body-md text-body-md pl-10 pr-4 focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors placeholder:text-surface-variant" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-text-secondary text-[20px] pointer-events-none">lock</span>
<input class="w-full h-input-height bg-surface border border-border-subtle rounded-DEFAULT text-text-primary font-body-md text-body-md pl-10 pr-4 focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors placeholder:text-surface-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full h-[48px] bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-DEFAULT flex items-center justify-center gap-2 hover:scale-[0.98] hover:bg-primary-fixed transition-all active:scale-95 shadow-sm" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer / Registration Link -->
<footer class="text-center mt-2 border-t border-border-subtle pt-6">
<p class="font-body-sm text-body-sm text-text-secondary">
                Don't have a vendor account? 
                <a class="text-primary font-medium hover:text-primary-fixed transition-colors ml-1" href="#">Request Access</a>
</p>
</footer>
</main>
<script>
        // Simple interaction script to add a subtle focus ring to the container when inputs are focused
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('opacity-100');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('opacity-100');
            });
        });
    </script>
</body></html>
