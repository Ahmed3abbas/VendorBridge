<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111319; /* background */
            color: #F1F3F5; /* text-primary */
        }
        
        /* Select styling overrides to fit theme */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239CA3AF' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") !important;
            background-position: right 0.5rem center !important;
            background-repeat: no-repeat !important;
            background-size: 1.5em 1.5em !important;
            padding-right: 2.5rem !important;
            -webkit-print-color-adjust: exact;
            color-adjust: exact;
        }
        select option {
            background-color: #1A1D27; /* surface */
            color: #F1F3F5;
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-4 md:p-container-padding bg-background antialiased selection:bg-primary-container selection:text-surface-container-lowest">
<!-- Main Card Container -->
<main class="w-full max-w-[560px] bg-surface border border-border-subtle rounded-lg shadow-lg relative overflow-hidden">
<!-- Subtle gradient accent at top of card -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container to-secondary-container"></div>
<div class="p-6 md:p-[32px]">
<!-- Header Section -->
<div class="text-center mb-[32px]">
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-[8px]">Create Account</h1>
<p class="font-body-md text-body-md text-text-secondary">Join VendorBridge to manage procurement and scaling.</p>
</div>
<form action="#" class="space-y-[24px]" method="POST">
<!-- Avatar Upload Placeholder -->
<div class="flex flex-col items-center justify-center mb-[32px]">
<div class="relative group cursor-pointer">
<div class="w-[96px] h-[96px] rounded-full border-2 border-dashed border-border-subtle bg-surface-container-low flex items-center justify-center transition-colors duration-200 group-hover:border-primary-container group-hover:bg-surface-hover">
<span class="material-symbols-outlined text-[32px] text-text-secondary group-hover:text-primary-container transition-colors duration-200" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                                add_a_photo
                            </span>
</div>
<div class="absolute bottom-0 right-0 bg-surface border border-border-subtle rounded-full w-[28px] h-[28px] flex items-center justify-center shadow-sm text-text-secondary">
<span class="material-symbols-outlined text-[16px]">
                                edit
                            </span>
</div>
</div>
<span class="font-label-caps text-label-caps text-text-secondary mt-[16px] uppercase tracking-wider">Profile Photo</span>
</div>
<!-- Form Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-[16px]">
<!-- Full Name -->
<div class="sm:col-span-2">
<label class="block font-label-caps text-label-caps text-text-secondary mb-[8px] uppercase" for="fullName">Full Name</label>
<input class="w-full h-input-height bg-surface border border-border-subtle rounded px-3 font-body-sm text-body-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-label-caps text-label-caps text-text-secondary mb-[8px] uppercase" for="email">Work Email</label>
<input class="w-full h-input-height bg-surface border border-border-subtle rounded px-3 font-body-sm text-body-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors" id="email" name="email" placeholder="jane@company.com" type="email"/>
</div>
<!-- Phone -->
<div>
<label class="block font-label-caps text-label-caps text-text-secondary mb-[8px] uppercase" for="phone">Phone Number</label>
<input class="w-full h-input-height bg-surface border border-border-subtle rounded px-3 font-body-sm text-body-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors font-data-mono text-data-mono" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Role -->
<div>
<label class="block font-label-caps text-label-caps text-text-secondary mb-[8px] uppercase" for="role">Account Role</label>
<select class="w-full h-input-height bg-surface border border-border-subtle rounded px-3 font-body-sm text-body-sm text-text-primary focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors appearance-none cursor-pointer" id="role" name="role">
<option disabled="" selected="" value="">Select Role</option>
<option value="procurement_officer">Procurement Officer</option>
<option value="finance_manager">Finance Manager</option>
<option value="admin">Admin</option>
<option value="vendor_rep">Vendor Rep</option>
</select>
</div>
<!-- Country -->
<div>
<label class="block font-label-caps text-label-caps text-text-secondary mb-[8px] uppercase" for="country">Country / Region</label>
<select class="w-full h-input-height bg-surface border border-border-subtle rounded px-3 font-body-sm text-body-sm text-text-primary focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors appearance-none cursor-pointer" id="country" name="country">
<option value="US">United States</option>
<option value="UK">United Kingdom</option>
<option value="CA">Canada</option>
<option selected="" value="IN">India</option>
<option value="SG">Singapore</option>
<option value="AE">United Arab Emirates</option>
</select>
</div>
</div>
<!-- Divider -->
<div class="border-t border-border-subtle my-[24px]"></div>
<!-- Terms and Submit -->
<div class="flex flex-col gap-[24px]">
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-border-subtle bg-surface focus:ring-secondary-container text-secondary-container cursor-pointer" id="terms" name="terms" type="checkbox"/>
</div>
<div class="ml-3 text-body-sm font-body-sm text-text-secondary">
<label class="cursor-pointer" for="terms">
                                I agree to the <a class="text-text-primary hover:text-primary-container transition-colors underline decoration-border-subtle underline-offset-2" href="#">Terms of Service</a> and <a class="text-text-primary hover:text-primary-container transition-colors underline decoration-border-subtle underline-offset-2" href="#">Privacy Policy</a>.
                            </label>
</div>
</div>
<!-- Primary Button -->
<button class="w-full h-[48px] bg-primary-container text-surface-container-lowest font-headline-sm text-headline-sm rounded flex items-center justify-center hover:bg-surface-tint active:scale-[0.98] transition-all duration-150" type="submit">
                        Create Account
                        <span class="material-symbols-outlined ml-2 text-[20px]" style="font-variation-settings: 'FILL' 0, 'wght' 600;">
                            arrow_forward
                        </span>
</button>
</div>
<!-- Login Link -->
<div class="text-center pt-[8px]">
<p class="font-body-sm text-body-sm text-text-secondary">
                        Already have an account? <a class="text-text-primary hover:text-primary-container transition-colors font-medium" href="#">Sign in here</a>
</p>
</div>
</form>
</div>
</main>
<!-- Simple interactive script for button press effect simulation (Tailwind active: class handles most, this is just for form validation demo) -->
<script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Visual feedback state
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin mr-2" style="font-variation-settings: 'wght' 400;">sync</span> Processing...`;
            btn.classList.add('opacity-90');
            btn.classList.remove('active:scale-[0.98]');
            
            // Simulate API call
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'wght' 600;">check</span> Account Created`;
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-accent-teal', 'text-surface-container-lowest');
                
                setTimeout(() => {
                    // Reset
                    btn.innerHTML = originalContent;
                    btn.classList.add('bg-primary-container');
                    btn.classList.remove('bg-accent-teal', 'opacity-90');
                    btn.classList.add('active:scale-[0.98]');
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
