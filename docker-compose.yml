services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge123
      POSTGRES_DB: vendorbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vendorbridge.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    ports:
      - "5000:5000"
    volumes:
      - ./server/src/uploads:/app/src/uploads
    depends_on:
      - db

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
